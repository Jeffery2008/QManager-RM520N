name: Build And Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, e.g. v0.1.5"
        required: true
        type: string
      release_name:
        description: "Optional release title"
        required: false
        type: string
      target_ref:
        description: "Branch or commit to release from"
        required: false
        default: "main"
        type: string
      prerelease:
        description: "Mark release as pre-release"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "name=${{ inputs.release_name || inputs.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "ref=${{ inputs.target_ref }}" >> "$GITHUB_OUTPUT"
            echo "prerelease=${{ inputs.prerelease }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.ref }}
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build frontend and package release assets
        run: bun run package

      - name: Verify release assets
        shell: bash
        run: |
          test -f qmanager-build/qmanager.tar.gz
          test -f qmanager-build/sha256sum.txt
          (
            cd qmanager-build
            sha256sum --check sha256sum.txt
          )

      - name: Create GitHub release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ steps.meta.outputs.ref }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          token: ${{ secrets.RELEASE_TOKEN }}
          files: |
            qmanager-build/qmanager.tar.gz
            qmanager-build/sha256sum.txt
